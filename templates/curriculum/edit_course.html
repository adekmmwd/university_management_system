{% extends "base.html" %}

{% block title %}Edit Course{% endblock %}
{% block page_title %}Edit Course{% endblock %}
{% block breadcrumb %}Courses · Edit{% endblock %}

{% block content %}
<div style="max-width:520px;">
  <div class="card card-p">
    <!-- Course Code (read-only) -->
    <div style="background:#f8faff;border:1px solid #e8edf8;border-radius:.5rem;padding:.65rem .85rem;margin-bottom:1rem;">
      <div style="font-size:.7rem;color:var(--muted);font-weight:600;">Course Code</div>
      <div style="font-family:monospace;font-weight:700;font-size:1.1rem;color:var(--navy);">{{ course.course_code }}</div>
    </div>

    <form method="POST" action="{{ url_for('curriculum.update_course_route', course_id=course.id) }}">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" name="title" required class="form-control"
               value="{{ course.course_name or course.title }}" placeholder="Course title">
      </div>
      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea name="description" rows="3" required class="form-control"
                  placeholder="Brief description…">{{ course.description or '' }}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Capacity *</label>
        <input type="number" name="capacity" min="1" max="500" required class="form-control"
               value="{{ course.capacity or 30 }}">
      </div>
      <hr class="divider">
      <div style="display:flex;gap:.6rem;">
        <button type="submit" class="btn btn-gold">
          <i data-lucide="save" style="width:14px;height:14px;"></i>Save Changes
        </button>
        <a href="{{ url_for('curriculum.courses_list') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-bold">Edit Course</h1>
    <a
      href="{{ url_for('curriculum.courses_list') }}"
      class="text-blue-600 hover:text-blue-800 font-medium"
    >
      ← Back to Courses
    </a>
  </div>

  <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
    <form
      method="POST"
      action="{{ url_for('curriculum.update_course_route', course_id=course.id) }}"
    >
      <div class="space-y-5">
        <!-- Course Code (read-only) -->
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2"
            >Course Code</label
          >
          <input
            type="text"
            value="{{ course.course_code }}"
            readonly
            class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-100 text-slate-600 cursor-not-allowed"
          />
        </div>

        <!-- Title -->
        <div>
          <label for="title" class="block text-sm font-bold text-slate-700 mb-2"
            >Course Title <span class="text-red-500">*</span></label
          >
          <input
            type="text"
            id="title"
            name="title"
            value="{{ course.course_name }}"
            required
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="e.g., Database Management"
          />
        </div>

        <!-- Description -->
        <div>
          <label
            for="description"
            class="block text-sm font-bold text-slate-700 mb-2"
            >Description <span class="text-red-500">*</span></label
          >
          <textarea
            id="description"
            name="description"
            rows="4"
            required
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter course description..."
          >
{{ course.description or '' }}</textarea
          >
        </div>

        <!-- Capacity -->
        <div>
          <label
            for="capacity"
            class="block text-sm font-bold text-slate-700 mb-2"
            >Capacity <span class="text-red-500">*</span></label
          >
          <input
            type="number"
            id="capacity"
            name="capacity"
            value="{{ course.capacity or 30 }}"
            min="1"
            required
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="e.g., 30"
          />
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            type="submit"
            class="w-full bg-slate-900 text-white font-bold py-3 px-6 rounded-lg hover:bg-slate-800 transition-colors"
          >
            Save Changes
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-8">
        <h1 class="text-3xl font-bold mb-2">Set Your Password</h1>

        {% if not valid %}
            <p class="text-slate-700 mt-3">{{ reason }}</p>
            <div class="mt-6">
                <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-bold hover:underline">Go to Login</a>
            </div>
        {% else %}
            <p class="text-slate-700 mt-3">Hi <span class="font-bold">{{ name }}</span>. Set a password for <span class="font-mono">{{ email }}</span>.</p>

            {% if error %}
                <div class="mt-4 bg-red-100 text-red-800 border border-red-200 px-4 py-3 rounded-lg font-bold text-sm">{{ error }}</div>
            {% endif %}

            <form method="POST" class="mt-6 space-y-4">
                <input type="hidden" name="token" value="{{ token }}" />

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1" for="password">New Password</label>
                    <input id="password" name="password" type="password" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1" for="confirm_password">Confirm Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent" />
                </div>

                <button type="submit" class="w-full bg-amber-500 text-white px-4 py-2 rounded font-bold hover:bg-amber-600">
                    Set Password
                </button>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}

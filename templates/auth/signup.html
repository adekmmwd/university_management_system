{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-200 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="font-serif text-2xl text-slate-800">Create Account</h1>
            <p class="text-sm text-slate-500 mt-1">Join the UniManage system</p>
        </div>

        <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Full Name *</label>
                <input type="text" name="full_name" required autofocus class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Username *</label>
                <input type="text" name="username" required class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">Password *</label>
                <input type="password" name="password" required class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-2">System Role</label>
                <select name="role" class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900 bg-white">
                    <option value="student">Student</option>
                    <option value="staff">Staff / Professor</option>
                    <option value="course_coordinator">Course Coordinator</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-amber-500 text-white font-bold py-3 rounded-lg hover:bg-amber-600 mt-2">Sign Up</button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            Already have an account? <a href="{{ url_for('auth.login') }}" class="text-slate-900 font-bold hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

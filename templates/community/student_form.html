{% extends "base.html" %}
{% block content %}
<h1 class="text-3xl font-bold mb-6">{% if student %}Edit{% else %}Add{% endif %} Student</h1>

<div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-lg">
    <form method="POST" class="space-y-4" id="student-form">
        {% if not student %}
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Student ID *</label>
            <input id="student_id" type="text" name="student_id" required class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
            <div id="student_id_error" class="text-red-600 text-sm mt-1"></div>
        </div>
        {% endif %}
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Full Name *</label>
            <input id="name" type="text" name="name" value="{{ student.name if student else '' }}" required class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email *</label>
            <input id="email" type="email" name="email" value="{{ student.email if student else '' }}" required class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
            <div id="email_error" class="text-red-600 text-sm mt-1"></div>
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Department</label>
            <input type="text" name="department" value="{{ student.department if student else '' }}" class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Year</label>
            <input type="text" name="year" value="{{ student.year if student else '' }}" class="w-full border-2 border-slate-200 rounded-lg px-4 py-2 focus:outline-none focus:border-slate-900">
        </div>
        
        <div class="flex gap-4 pt-4">
            <button type="submit" class="bg-slate-900 text-white font-bold py-2 px-6 rounded hover:bg-slate-800">Save</button>
            <a href="{{ url_for('community.students_list') }}" class="py-2 px-6 border-2 border-slate-200 text-slate-600 font-bold rounded hover:bg-slate-50">Cancel</a>
        </div>
    </form>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('student-form');
    const sidInput = document.getElementById('student_id');
    const emailInput = document.getElementById('email');
    const sidError = document.getElementById('student_id_error');
    const emailError = document.getElementById('email_error');
    let checkTimer = null;

    function isValidStudentId(v) {
        return /^\d{7}$/.test((v||'').trim());
    }
    function isValidEmail(v) {
        return /^[^@]+@[^@]+\.[^@]+$/.test((v||'').trim());
    }

    function checkUnique() {
        const params = new URLSearchParams();
        if (sidInput) params.set('student_id', sidInput.value.trim());
        if (emailInput) params.set('email', emailInput.value.trim());
        if (!params.toString()) return;
        fetch(`/api/students/check?${params}`)
            .then(r => r.json())
            .then(data => {
                if (sidInput) {
                    if (!isValidStudentId(sidInput.value)) {
                        sidError.textContent = 'Student ID must be 7 digits.';
                    } else if (data.student_id_exists) {
                        sidError.textContent = 'Student ID already exists.';
                    } else {
                        sidError.textContent = '';
                    }
                }
                if (emailInput) {
                    if (!isValidEmail(emailInput.value)) {
                        emailError.textContent = 'Enter a valid email.';
                    } else if (data.email_exists) {
                        emailError.textContent = 'Email already exists.';
                    } else {
                        emailError.textContent = '';
                    }
                }
            }).catch(() => {});
    }

    if (sidInput) {
        sidInput.addEventListener('input', function() {
            clearTimeout(checkTimer);
            checkTimer = setTimeout(checkUnique, 300);
        });
    }
    if (emailInput) {
        emailInput.addEventListener('blur', function() {
            clearTimeout(checkTimer);
            checkTimer = setTimeout(checkUnique, 0);
        });
    }

    form.addEventListener('submit', function(e) {
        if ((sidError && sidError.textContent) || (emailError && emailError.textContent)) {
            e.preventDefault();
            alert('Please fix validation errors before saving.');
        }
    });
});
</script>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>UniManage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex min-h-screen">
    
    {% if session.get('user_id') %}
    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col">
        <h2 class="text-xl font-bold mb-8 text-amber-500">UniManage</h2>
        <a href="{{ url_for('dashboard') }}" class="mb-4 hover:text-amber-400">Temporary Dashboard</a>
        <a href="{{ url_for('auth.logout') }}" class="mt-auto text-red-400 font-bold hover:underline">Logout</a>
    </aside>
    {% endif %}
    
    <main class="flex-1 p-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2 max-w-md mx-auto">
                {% for category, message in messages %}
                    <div class="px-4 py-3 rounded-lg font-bold text-sm 
                        {% if category == 'success' %} bg-green-100 text-green-800 border border-green-200
                        {% elif category == 'danger' %} bg-red-100 text-red-800 border border-red-200
                        {% else %} bg-blue-100 text-blue-800 border border-blue-200 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
